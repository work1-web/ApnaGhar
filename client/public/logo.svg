<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0D9488" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- House body -->
  <rect x="34" y="62" width="52" height="36" rx="3" fill="white" opacity="0.95"/>

  <!-- Roof -->
  <polygon points="22,65 60,30 98,65" fill="url(#roofGrad)" opacity="0.95"/>
  <polygon points="22,65 60,30 98,65" fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round" opacity="0.4"/>

  <!-- Chimney -->
  <rect x="70" y="36" width="8" height="16" rx="2" fill="white" opacity="0.8"/>

  <!-- Door -->
  <rect x="51" y="76" width="18" height="22" rx="3" fill="url(#bgGrad)" opacity="0.85"/>
  <!-- Door knob -->
  <circle cx="65" cy="88" r="1.8" fill="white" opacity="0.9"/>

  <!-- Left window -->
  <rect x="37" y="68" width="12" height="11" rx="2" fill="url(#bgGrad)" opacity="0.7"/>
  <line x1="43" y1="68" x2="43" y2="79" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="37" y1="73.5" x2="49" y2="73.5" stroke="white" stroke-width="1" opacity="0.6"/>

  <!-- Right window -->
  <rect x="71" y="68" width="12" height="11" rx="2" fill="url(#bgGrad)" opacity="0.7"/>
  <line x1="77" y1="68" x2="77" y2="79" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="71" y1="73.5" x2="83" y2="73.5" stroke="white" stroke-width="1" opacity="0.6"/>

  <!-- Sparkle / AI dot top right -->
  <circle cx="88" cy="28" r="5" fill="#34D399" opacity="0.95"/>
  <circle cx="88" cy="28" r="2.5" fill="white"/>

  <!-- Ground line -->
  <rect x="26" y="97" width="68" height="3" rx="1.5" fill="white" opacity="0.25"/>
</svg>
